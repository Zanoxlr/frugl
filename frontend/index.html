<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Frugl</title>
<meta name="description" content="AI svetovalec, ki ti pove, kaj placujes po nepotrebnem.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --card2:#1c232d; --line:#2a323d;
    --fg:#e6edf3; --dim:#8b98a5; --accent:#3fb950; --accent2:#2ea043;
    --warn:#f0883e; --strike:#f85149; --blue:#388bfd;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{background:var(--bg); color:var(--fg); font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       max-width:440px; margin:0 auto; display:flex; flex-direction:column; min-height:100%}
  .screen{display:none; flex-direction:column; flex:1; min-height:0}
  .screen.active{display:flex}
  header{padding:16px 18px 10px; display:flex; align-items:center; gap:12px}
  header .back{background:none;border:none;color:var(--fg);font-size:22px;cursor:pointer;padding:0 4px 0 0}
  h1{font-size:20px; margin:0}
  .sub{color:var(--dim); font-size:13px; margin:2px 0 0}
  .brand{display:flex;align-items:center;gap:8px}
  .brand .mk{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#3fb950,#2ea043);display:grid;place-items:center;color:#04160d;font-weight:800;font-size:15px}

  /* dashboard */
  .spend{margin:6px 18px 14px; padding:16px; background:linear-gradient(135deg,#161b22,#1c2530);
         border:1px solid var(--line); border-radius:14px}
  .spend .lbl{color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.5px}
  .spend .amt{font-size:32px; font-weight:700; margin-top:2px}
  .spend .amt small{font-size:15px; color:var(--dim); font-weight:400}
  .tiles{padding:0 14px 20px; overflow-y:auto}
  .tile{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
        border-radius:13px; padding:13px 14px; margin:8px 4px; cursor:pointer; transition:.12s}
  .tile:active{transform:scale(.985); background:var(--card2)}
  .tile .ic{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;background:#0d1117;flex:none}
  .tile .mid{flex:1; min-width:0}
  .tile .prov{font-weight:600}
  .tile .plan{color:var(--dim); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tile .price{font-weight:700; white-space:nowrap}
  .badge{display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:20px; margin-top:4px; font-weight:600}
  .badge.warn{background:rgba(240,136,62,.15); color:var(--warn)}
  .badge.info{background:rgba(56,139,253,.15); color:var(--blue)}
  .thesis{margin:2px 18px 12px;color:var(--dim);font-size:12.5px;line-height:1.4}

  /* chat */
  .msgs{flex:1; overflow-y:auto; padding:8px 14px 4px; display:flex; flex-direction:column; gap:8px}
  .b{max-width:82%; padding:9px 13px; border-radius:16px; font-size:14.5px; white-space:pre-wrap; word-wrap:break-word}
  .b.ai{align-self:flex-start; background:var(--card2); border-bottom-left-radius:5px}
  .b.me{align-self:flex-end; background:var(--accent2); color:#fff; border-bottom-right-radius:5px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:4px 14px 8px}
  .chip{background:var(--card2);border:1px solid var(--line);color:var(--fg);font-size:13px;padding:7px 12px;border-radius:16px;cursor:pointer}
  .chip:active{background:var(--card)}
  .typing{align-self:flex-start; background:var(--card2); padding:11px 15px; border-radius:16px; border-bottom-left-radius:5px}
  .typing span{display:inline-block;width:6px;height:6px;margin:0 1.5px;background:var(--dim);border-radius:50%;animation:bt 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bt{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .composer{display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg)}
  .composer input{flex:1; background:var(--card2); border:1px solid var(--line); color:var(--fg); border-radius:22px; padding:11px 15px; font-size:15px; outline:none}
  .composer button, .cta{background:var(--accent2); color:#fff; border:none; border-radius:22px; padding:0 18px; font-weight:600; cursor:pointer; font-size:15px}
  .finish{margin:2px 14px 10px; text-align:center}
  .finish button{background:var(--accent2);border:none;color:#fff;border-radius:22px;padding:11px 18px;font-weight:700;cursor:pointer;font-size:14.5px;width:calc(100% - 12px)}

  /* needs card */
  .card{margin:10px 16px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; overflow-y:auto}
  .card h2{margin:0 0 4px; font-size:18px}
  .card .summary{color:var(--dim); font-size:14px; margin-bottom:14px}
  .rec{background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.35); border-radius:12px; padding:13px; margin-bottom:14px}
  .rec .t{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); font-weight:700}
  .rec .n{font-weight:700; font-size:16px; margin-top:3px}
  .rec .w{color:var(--dim); font-size:13px; margin-top:4px}
  .drop .t{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--strike); font-weight:700; margin-bottom:8px}
  .drop-item{display:flex; justify-content:space-between; gap:10px; padding:10px 12px; background:var(--card2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; transition:.5s}
  .drop-item.struck{opacity:.5}
  .drop-item.struck .di-name{text-decoration:line-through; text-decoration-color:var(--strike)}
  .di-name{font-size:13.5px} .di-name small{color:var(--dim); display:block; font-size:11.5px; margin-top:2px}
  .di-price{color:var(--strike); font-weight:700; white-space:nowrap}
  .advisory{background:var(--card2);border:1px dashed var(--line);border-radius:10px;padding:11px 12px;color:var(--dim);font-size:13px;margin-bottom:10px}
  .saved{text-align:center; margin:14px 0 4px; font-size:15px}
  .saved b{color:var(--accent); font-size:26px; display:block}
  .saved .sub{display:block}
  .keepnote{color:var(--dim);font-size:12px;margin-top:12px;line-height:1.4}
  .cta{display:block; width:calc(100% - 32px); margin:14px 16px; padding:14px; text-align:center}
  /* honest hesitation-handling AT the offer moment (not a FAQ) */
  .hesit{margin:6px 16px 16px;display:flex;flex-wrap:wrap;gap:7px}
  .hesit .chip{font-size:12.5px}
  .hesit-answer{margin:0 16px 14px;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--fg);font-size:13.5px;line-height:1.45;display:none}
  .hesit-answer.show{display:block}
  .done{padding:40px 24px; text-align:center}
  .done .big{font-size:52px} .done h2{margin:12px 0 6px}
  .offline{position:fixed; top:0; left:50%; transform:translateX(-50%); background:var(--warn); color:#000; font-size:10px; padding:2px 8px; border-radius:0 0 6px 6px; font-weight:700}
</style>
</head>
<body>

<!-- DASHBOARD -->
<section id="dash" class="screen active">
  <header><div class="brand"><span class="mk">F</span><div><h1>Frugl</h1><p class="sub" id="dash-sub">vsi tvoji racuni na enem mestu</p></div></div></header>
  <div class="spend">
    <div class="lbl">skupaj na mesec</div>
    <div class="amt" id="total">–<small> /mes</small></div>
  </div>
  <p class="thesis">nismo primerjalnik cen. povemo ti, kaj placujes po nepotrebnem — tudi to, kar bi ti drugi prodali.</p>
  <div class="tiles" id="tiles"></div>
</section>

<!-- CHAT -->
<section id="chat" class="screen">
  <header>
    <button class="back" onclick="showDash()">‹</button>
    <div><h1 id="chat-title">Svetovalec</h1><p class="sub" id="chat-sub"></p></div>
  </header>
  <div class="msgs" id="msgs"></div>
  <div class="chips" id="chips"></div>
  <div class="finish" id="finish" style="display:none">
    <button onclick="buildProfile()">pokazi kaj res rabim →</button>
  </div>
  <div class="composer">
    <input id="input" placeholder="vprasaj karkoli o tem racunu…" autocomplete="off"
           onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">▶</button>
  </div>
</section>

<!-- NEEDS CARD -->
<section id="needs" class="screen">
  <header>
    <button class="back" onclick="showChat()">‹</button>
    <div><h1>Kaj res rabis</h1><p class="sub" id="needs-vertical"></p></div>
  </header>
  <div class="card" id="needs-card"></div>
  <div class="hesit" id="hesit"></div>
  <div class="hesit-answer" id="hesit-answer"></div>
</section>

<!-- DONE -->
<section id="done" class="screen">
  <div class="done">
    <div class="big">✅</div>
    <h2>Urejeno!</h2>
    <p class="sub">Pripravimo ti tocno to ponudbo in potrdis vsak korak. Brez presenecenj, brez upsella.</p>
    <button class="cta" onclick="showDash()" style="margin-top:20px">nazaj na pregled</button>
  </div>
</section>

<script>
/* ============================================================================
   Frugl frontend — wired to Zan's live API (backend/main.py v0.2.0)
   GET  /api/state              -> { persona, household, currentSubscriptions[], totals }
   POST /api/compare-all        -> { byVertical, totals }        (dashboard badges)
   POST /api/profile?vertical=  -> { profile, offer }            (the needs card)
   /api/chat + /api/lead not wired yet -> handled client-side (stub).
   ========================================================================== */
// Mount-aware API base: "" at the site root (local dev), "/frugl" under a Tailscale
// funnel subpath. Handles trailing slash, no slash, and /index.html — no hardcoding.
const API = (function(){
  const p = location.pathname;
  if(p.endsWith("/")) return p.slice(0, -1);          // "/frugl/" -> "/frugl"; "/" -> ""
  if(/\.[^\/]+$/.test(p)) return p.replace(/\/[^\/]*$/, "");  // "/frugl/index.html" -> "/frugl"
  return p;                                            // "/frugl" -> "/frugl"
})();
let STATE = null, FINDINGS = null, VERTICAL = null, HISTORY = [], TURNS = 0, OFFLINE = false, BOOKING = false;

async function getJSON(path){ try{ const r=await fetch(API+path); if(r.ok) return await r.json(); }catch(e){} return null; }
async function post(path, body){ try{ const r=await fetch(API+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}); if(r.ok) return await r.json(); }catch(e){} return null; }

const ICONS  = {telco:"📶", energy:"⚡", insurance:"🛡️", water:"💧"};
const V_TITLE= {telco:"Telko", energy:"Energija", insurance:"Zavarovanja", water:"Voda"};
const V_LABEL= {telco:"mobilni, net + TV", energy:"elektrika + plin", insurance:"zavarovanja", water:"voda (informativno)"};
const V_ORDER= ["telco","energy","insurance","water"];

function fmt(n){ return (n==null)?"–":(Number(n).toFixed(2).replace(".",",")+"€"); }
function esc(s){ return String(s==null?"":s).replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c])); }
function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
function showDash(){ show("dash"); }
function showChat(){ show("chat"); }
function stateForEngine(s){ return { household: s.household||{}, currentSubscriptions: s.currentSubscriptions||[] }; }

async function boot(){
  STATE = await getJSON("/api/state");
  if(!STATE){ OFFLINE=true; STATE = FALLBACK_STATE; document.body.insertAdjacentHTML("beforeend",'<div class="offline">predogled — backend ni dosegljiv</div>'); }
  FINDINGS = await post("/api/compare-all", { state: stateForEngine(STATE) });
  renderDash();
}

function renderDash(){
  document.getElementById("total").innerHTML = fmt(STATE.totals && STATE.totals.monthlyEur)+"<small> /mes</small>";
  const byV = (STATE.totals && STATE.totals.byVertical) || {};
  const linesByV = {};
  (STATE.currentSubscriptions||[]).forEach(l=>{ (linesByV[l.vertical]=linesByV[l.vertical]||[]).push(l); });
  const findings = (FINDINGS && FINDINGS.byVertical) || {};
  const tiles = document.getElementById("tiles"); tiles.innerHTML = "";
  V_ORDER.forEach(v=>{
    const lines = linesByV[v]; if(!lines || !lines.length) return;
    const providers = [...new Set(lines.map(l=>l.provider))].join(", ");
    const f = findings[v];
    const hasFinding = f && (((f.dontPayFor||[]).length) || (f.monthlySavingsEur>0)
      || (f.recommendation && Object.keys(f.recommendation).length) || ((f.notes||[]).length));
    let badge = "";
    if(v==="water") badge = `<span class="badge info">samo informativno</span>`;
    else if(hasFinding) badge = `<span class="badge warn">vredno pogledati</span>`;
    const n = lines.length;
    tiles.insertAdjacentHTML("beforeend", `
      <div class="tile" onclick="openChat('${v}')">
        <div class="ic">${ICONS[v]||"📦"}</div>
        <div class="mid"><div class="prov">${esc(V_TITLE[v]||v)}</div>
          <div class="plan">${esc(providers)} · ${n} ${n===1?'postavka':(n===2?'postavki':'postavke')}</div>${badge}</div>
        <div class="price">${fmt(byV[v])}</div>
      </div>`);
  });
}

/* ---- chat (stub: /api/chat not wired; grounded on real state) ---- */
function linesOf(v){ return (STATE.currentSubscriptions||[]).filter(l=>l.vertical===v); }
function opener(v){
  if(v==="water") return "voda je obcinski monopol — menjave ni. tvoj racun je korekten, samo posteno ti razlozim postavke.";
  const names = linesOf(v).map(l=>l.provider+" "+l.planName.replace(/\s*\(.*?\)\s*/g,"").trim());
  return "vidim tvoje postavke: "+names.join(", ")+".\nnaj pogledam, kaj od tega res rabis in kaj placujes zaman?";
}
const CHIPS = {
  telco:["a Arena Sport je zastonj?","koliko podatkov res rabim?"],
  energy:["a se splaca menjat dobavitelja?","zakaj je energija oznacena?"],
  insurance:["zakaj je zdravstveno rdece?","kaj pa avtomobilsko?"],
  water:["zakaj tu ni prihranka?"]
};
function openChat(vertical){
  VERTICAL=vertical; HISTORY=[]; TURNS=0;
  document.getElementById("chat-title").textContent = "Svetovalec";
  document.getElementById("chat-sub").textContent = V_LABEL[vertical]||vertical;
  document.getElementById("msgs").innerHTML = "";
  document.getElementById("finish").style.display = "none";
  renderChips(vertical);
  show("chat");
  addMsg("ai", opener(vertical));
  if(vertical!=="water") setTimeout(()=>{ document.getElementById("finish").style.display="block"; }, 500);
}
function renderChips(v){
  const el=document.getElementById("chips");
  el.innerHTML=(CHIPS[v]||[]).map(c=>`<span class="chip" onclick="ask('${esc(c).replace(/'/g,"\\'")}')">${esc(c)}</span>`).join("");
}
function ask(q){ document.getElementById("input").value=q; send(); }
function addMsg(role, text){
  const m=document.getElementById("msgs");
  const el=document.createElement("div"); el.className="b "+role; el.textContent=text||"";
  m.appendChild(el); m.scrollTop=m.scrollHeight; return el;
}
function scrollMsgs(){ const m=document.getElementById("msgs"); m.scrollTop=m.scrollHeight; }
function typing(on){
  const m=document.getElementById("msgs"); let t=document.getElementById("tw");
  if(on && !t){ m.insertAdjacentHTML("beforeend",'<div class="typing" id="tw"><span></span><span></span><span></span></div>'); m.scrollTop=m.scrollHeight; }
  if(!on && t) t.remove();
}
/* grounded canned answers until /api/chat streams (per Zan's roadmap) */
function cannedReply(v, q){
  const t=q.toLowerCase();
  if(v==="telco"){
    if(t.includes("arena")||t.includes("sport")) return "ne. Arena Sport je locen dodatek za 4,99 eur na mesec, ni v osnovnem paketu — sporta pa ne gledas, torej cista izguba.";
    if(t.includes("podatk")||t.includes("gb")) return "porabis okoli 15 GB, placujes pa paket s 500 GB (27,99 eur). MVNO neomejeni paketi te pokrijejo za ~8 eur.";
  }
  if(v==="insurance"){
    if(t.includes("zdravstv")||t.includes("rdece")||t.includes("dopoln")) return "ker placujes staro dopolnilno zdravstveno (35 eur). To je bilo 2024 ukinjeno in nadomesceno z obveznim OZP, ki ga ze placujes prek place — torej najbrz placujes dvojno.";
    if(t.includes("avto")||t.includes("ao")) return "avtomobilsko AO je zakonsko obvezno — pustimo ga pri miru. Ni vse za rezat.";
  }
  if(v==="energy") return "energija je odvisna od tvoje letne porabe (kwh). ce mi jo poves, ti tocno povem, ali se menjava splaca; sicer ti pokazem najnizjo ceno na kwh.";
  return "to ti tocno povem iz tvojih podatkov — pritisni 'pokazi kaj res rabim'.";
}
/* SSE consumer for Zan's POST /api/chat: frames `data: {"type":"token","text":..}`
   stream into the bubble, terminal `{"type":"done","full":..}`. Fetch+ReadableStream
   (EventSource is GET-only). Grounded on the real user's subs via `state`. */
async function send(){
  const inp=document.getElementById("input"); const text=inp.value.trim(); if(!text) return;
  inp.value=""; addMsg("me", text); HISTORY.push({role:"user", text:text}); TURNS++;
  typing(true);
  let acc="", bubble=null;
  try{
    const resp = await fetch(API+"/api/chat?vertical="+encodeURIComponent(VERTICAL), {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ vertical:VERTICAL, history:HISTORY, state: stateForEngine(STATE) })
    });
    if(!resp.ok || !resp.body) throw new Error("no stream "+resp.status);
    const reader = resp.body.getReader(), dec = new TextDecoder();
    let buf="";
    while(true){
      const {value, done} = await reader.read(); if(done) break;
      buf += dec.decode(value, {stream:true});
      let i;
      while((i = buf.indexOf("\n\n")) >= 0){
        const frame = buf.slice(0,i); buf = buf.slice(i+2);
        const dl = frame.split("\n").find(l=>l.startsWith("data:"));
        if(!dl) continue;
        let evt; try{ evt = JSON.parse(dl.slice(5).trim()); }catch(e){ continue; }
        if(evt.type==="token" && evt.text){
          if(!bubble){ typing(false); bubble = addMsg("ai",""); }
          acc += evt.text; bubble.textContent = acc; scrollMsgs();
        } else if(evt.type==="done" && evt.full && !acc){
          typing(false); bubble = bubble || addMsg("ai",""); acc = evt.full; bubble.textContent = acc; scrollMsgs();
        }
      }
    }
  }catch(e){ /* offline / no backend -> grounded canned fallback below */ }
  typing(false);
  if(!acc){ acc = cannedReply(VERTICAL, text); if(bubble) bubble.textContent = acc; else addMsg("ai", acc); }
  HISTORY.push({role:"assistant", text: acc});
  if(VERTICAL!=="water") document.getElementById("finish").style.display="block";
}

/* ---- the money shot: real /api/profile offer ---- */
async function buildProfile(){
  typing(true); document.getElementById("finish").style.display="none";
  // Send the real transcript + state so extraction reflects THIS chat (not the canned profile).
  const res = await post("/api/profile?vertical="+encodeURIComponent(VERTICAL),
                         {history:HISTORY, state:stateForEngine(STATE)});
  typing(false);
  if(res && res.offer) renderNeeds(res.offer, res.profile);
  else renderNeeds((FALLBACK_OFFER[VERTICAL]||FALLBACK_OFFER.telco), null);
}
function recTitle(node){
  if(node.toName) return esc(node.toName)+(node.toOperator?" ("+esc(node.toOperator)+")":"")+" – "+fmt(node.toMonthlyEur)+"/mes";
  if(node.cheapest) return esc(node.cheapest.provider)+" "+esc(node.cheapest.name);
  if(node.tradeoff) return "primerjaj: najnizja cena/kwh ali brez mesecne takse";
  return "";
}
function renderNeeds(offer, profile){
  VERTICAL = offer.vertical || VERTICAL;
  document.getElementById("needs-vertical").textContent = V_LABEL[offer.vertical]||offer.vertical;
  const c = document.getElementById("needs-card");

  let recHtml = "";
  const rec = offer.recommendation;
  if(rec && typeof rec==="object"){
    Object.values(rec).forEach(node=>{
      if(node && typeof node==="object"){
        const title = recTitle(node);
        if(title) recHtml += `<div class="rec"><div class="t">pravo zate</div><div class="n">${title}</div><div class="w">${esc(node.why||"")}</div></div>`;
      }
    });
  }
  const drops = (offer.dontPayFor||[]).map((d,i)=>`
    <div class="drop-item" id="drop${i}">
      <div class="di-name">${esc(d.name)}${d.why?`<small>${esc(d.why)}</small>`:""}</div>
      <div class="di-price">−${fmt(d.monthlyEur)}</div>
    </div>`).join("");

  const sav = offer.monthlySavingsEur;
  let savHtml = "";
  if(sav!=null && sav>0) savHtml = `<div class="saved">prihranek <b>${fmt(sav)}/mes</b><span class="sub">${fmt(offer.annualSavingsEur)} na leto</span></div>`;
  const advisory = (offer.notes||[]).length ? `<div class="advisory">${esc(offer.notes[0])}</div>` : "";

  const heading = (offer.vertical==="water") ? "tvoj racun je korekten" : "kaj res rabis";
  const summary = (profile && profile.summary) || "";
  c.innerHTML = `
    <h2>${esc(heading)}</h2>
    ${summary?`<p class="summary">${esc(summary)}</p>`:""}
    ${recHtml}
    ${drops?`<div class="drop"><div class="t">za to placujes, pa ne rabis</div>${drops}</div>`:""}
    ${(sav!=null && sav>0) ? "" : advisory}
    ${savHtml}
    ${(sav!=null && sav>0 && advisory)?`<p class="keepnote">${esc(offer.notes[0])}</p>`:""}
    <button class="cta" onclick="book(this)">uredi prehod — ti potrdis vsak korak</button>`;
  renderHesit(offer);
  show("needs");
  (offer.dontPayFor||[]).forEach((_,i)=> setTimeout(()=>{ const el=document.getElementById("drop"+i); if(el) el.classList.add("struck"); }, 500+i*650));
}

/* honest hesitation-handling AT the offer moment (per house style: no pressure) */
const HESIT = [
  ["rabim se premislit", "seveda — brez pritiska. tocno ti smo pokazali, kaj placujes zaman; watchdog te opozori, ko boš pripravljen. nic se ne zgodi brez tvoje potrditve."],
  ["v cem je kavelj?", "ni ga. preverjanje je zastonj; zasluzimo sele, ko ti dejansko prihranimo (ponudnik nam placa priporocilo). ce ne najdemo bolje, te nic ne stane."],
  ["moram vprasat partnerja", "logicno — pokazi mu tole stran z rezultatom. nic ni nujnega; ponudbo pripravimo, ko se oba strinjata."],
  ["a moram menjat takoj?", "ne. lahko samo pogledas. povemo ti, kdaj ti potece vezava in ali se prehod splaca ze zdaj ali ob izteku."]
];
function renderHesit(offer){
  const el=document.getElementById("hesit"); const ans=document.getElementById("hesit-answer");
  ans.classList.remove("show"); ans.textContent="";
  if(offer.vertical==="water"){ el.innerHTML=""; return; }
  el.innerHTML = HESIT.map((h,i)=>`<span class="chip" onclick="hesit(${i})">${esc(h[0])}</span>`).join("");
}
function hesit(i){
  const ans=document.getElementById("hesit-answer");
  ans.textContent = HESIT[i][1]; ans.classList.add("show");
  ans.scrollIntoView({block:"nearest"});
}

async function book(btn){
  if(BOOKING) return;                       // guard: one lead per tap, no double-submit
  BOOKING = true;
  if(btn){ btn.disabled = true; btn.style.opacity = .6; btn.textContent = "pripravljam…"; }
  await post("/api/lead?vertical="+encodeURIComponent(VERTICAL),
             {history:HISTORY, state:stateForEngine(STATE)});
  BOOKING = false;
  show("done");
}
