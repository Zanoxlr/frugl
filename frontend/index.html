<!doctype html>
<html lang="sl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SubSmart</title>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --card2:#1c232d; --line:#2a323d;
    --fg:#e6edf3; --dim:#8b98a5; --accent:#3fb950; --accent2:#2ea043;
    --warn:#f0883e; --strike:#f85149; --blue:#388bfd;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{background:var(--bg); color:var(--fg); font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       max-width:440px; margin:0 auto; display:flex; flex-direction:column; min-height:100%}
  .screen{display:none; flex-direction:column; flex:1; min-height:0}
  .screen.active{display:flex}
  header{padding:16px 18px 10px; display:flex; align-items:center; gap:12px}
  header .back{background:none;border:none;color:var(--fg);font-size:22px;cursor:pointer;padding:0 4px 0 0}
  h1{font-size:20px; margin:0}
  .sub{color:var(--dim); font-size:13px; margin:2px 0 0}

  /* dashboard */
  .spend{margin:6px 18px 14px; padding:16px; background:linear-gradient(135deg,#161b22,#1c2530);
         border:1px solid var(--line); border-radius:14px}
  .spend .lbl{color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.5px}
  .spend .amt{font-size:32px; font-weight:700; margin-top:2px}
  .spend .amt small{font-size:15px; color:var(--dim); font-weight:400}
  .tiles{padding:0 14px 20px; overflow-y:auto}
  .tile{display:flex; align-items:center; gap:13px; background:var(--card); border:1px solid var(--line);
        border-radius:13px; padding:13px 14px; margin:8px 4px; cursor:pointer; transition:.12s}
  .tile:active{transform:scale(.985); background:var(--card2)}
  .tile .ic{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;background:#0d1117;flex:none}
  .tile .mid{flex:1; min-width:0}
  .tile .prov{font-weight:600}
  .tile .plan{color:var(--dim); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .tile .price{font-weight:700; white-space:nowrap}
  .badge{display:inline-block; font-size:10.5px; padding:2px 7px; border-radius:20px; margin-top:4px; font-weight:600}
  .badge.warn{background:rgba(240,136,62,.15); color:var(--warn)}
  .badge.info{background:rgba(56,139,253,.15); color:var(--blue)}

  /* chat */
  .msgs{flex:1; overflow-y:auto; padding:8px 14px 4px; display:flex; flex-direction:column; gap:8px}
  .b{max-width:82%; padding:9px 13px; border-radius:16px; font-size:14.5px; white-space:pre-wrap; word-wrap:break-word}
  .b.ai{align-self:flex-start; background:var(--card2); border-bottom-left-radius:5px}
  .b.me{align-self:flex-end; background:var(--accent2); color:#fff; border-bottom-right-radius:5px}
  .typing{align-self:flex-start; background:var(--card2); padding:11px 15px; border-radius:16px; border-bottom-left-radius:5px}
  .typing span{display:inline-block;width:6px;height:6px;margin:0 1.5px;background:var(--dim);border-radius:50%;animation:bt 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bt{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
  .composer{display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg)}
  .composer input{flex:1; background:var(--card2); border:1px solid var(--line); color:var(--fg); border-radius:22px; padding:11px 15px; font-size:15px; outline:none}
  .composer button, .cta{background:var(--accent2); color:#fff; border:none; border-radius:22px; padding:0 18px; font-weight:600; cursor:pointer; font-size:15px}
  .finish{margin:2px 14px 10px; text-align:center}
  .finish button{background:none;border:1px solid var(--accent);color:var(--accent);border-radius:22px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13.5px}

  /* needs card */
  .card{margin:10px 16px; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; overflow-y:auto}
  .card h2{margin:0 0 4px; font-size:18px}
  .card .summary{color:var(--dim); font-size:14px; margin-bottom:14px}
  .rec{background:rgba(63,185,80,.1); border:1px solid rgba(63,185,80,.35); border-radius:12px; padding:13px; margin-bottom:14px}
  .rec .t{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--accent); font-weight:700}
  .rec .n{font-weight:700; font-size:16px; margin-top:3px}
  .rec .w{color:var(--dim); font-size:13px; margin-top:4px}
  .drop .t{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--strike); font-weight:700; margin-bottom:8px}
  .drop-item{display:flex; justify-content:space-between; gap:10px; padding:10px 12px; background:var(--card2); border:1px solid var(--line); border-radius:10px; margin-bottom:8px; transition:.5s}
  .drop-item.struck{opacity:.5}
  .drop-item.struck .di-name{text-decoration:line-through; text-decoration-color:var(--strike)}
  .di-name{font-size:13.5px} .di-name small{color:var(--dim); display:block; font-size:11.5px; margin-top:2px}
  .di-price{color:var(--strike); font-weight:700; white-space:nowrap}
  .saved{text-align:center; margin:14px 0 4px; font-size:15px}
  .saved b{color:var(--accent); font-size:26px; display:block}
  .cta{display:block; width:calc(100% - 32px); margin:14px 16px; padding:14px; text-align:center}
  .done{padding:40px 24px; text-align:center}
  .done .big{font-size:52px} .done h2{margin:12px 0 6px}
  .mock-tag{position:fixed; top:0; right:0; background:var(--warn); color:#000; font-size:9px; padding:2px 6px; border-bottom-left-radius:6px; font-weight:700; opacity:.85}
</style>
</head>
<body>

<!-- DASHBOARD -->
<section id="dash" class="screen active">
  <header><div><h1>SubSmart</h1><p class="sub" id="dash-sub">tvoje narocnine na enem mestu</p></div></header>
  <div class="spend">
    <div class="lbl">skupaj na mesec</div>
    <div class="amt" id="total">–<small> /mes</small></div>
  </div>
  <div class="tiles" id="tiles"></div>
</section>

<!-- CHAT -->
<section id="chat" class="screen">
  <header>
    <button class="back" onclick="showDash()">‹</button>
    <div><h1 id="chat-title">Svetovalec</h1><p class="sub" id="chat-sub"></p></div>
  </header>
  <div class="msgs" id="msgs"></div>
  <div class="finish" id="finish" style="display:none">
    <button onclick="buildProfile()">ugotovi kaj res rabim →</button>
  </div>
  <div class="composer">
    <input id="input" placeholder="vprasaj karkoli…" autocomplete="off"
           onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">▶</button>
  </div>
</section>

<!-- NEEDS CARD -->
<section id="needs" class="screen">
  <header>
    <button class="back" onclick="showChat()">‹</button>
    <div><h1>Kaj res rabis</h1><p class="sub" id="needs-vertical"></p></div>
  </header>
  <div class="card" id="needs-card"></div>
</section>

<!-- DONE -->
<section id="done" class="screen">
  <div class="done">
    <div class="big">✅</div>
    <h2>Poslano!</h2>
    <p class="sub">Pravi ponudnik te poklice s tocno to ponudbo. Brez presenecenj, brez upsella.</p>
    <button class="cta" onclick="showDash()" style="margin-top:20px">nazaj na pregled</button>
  </div>
</section>

<script>
const API = "";                 // same-origin backend
let STATE = null, VERTICAL = null, HISTORY = [], TURNS = 0;

async function api(path, body){
  try{
    const r = await fetch(API+path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)});
    if(!r.ok) throw new Error(r.status);
    return await r.json();
  }catch(e){ return null; } // caller handles null with fallback
}
async function getState(){
  try{ const r = await fetch(API+"/api/state"); if(r.ok) return await r.json(); }catch(e){}
  return MOCK; // preview/fallback so the UI is always viewable
}

const ICONS = {telco:"📶", energy:"⚡", gas:"🔥", insurance:"🛡️", water:"💧"};

async function boot(){
  STATE = await getState();
  if(STATE===MOCK) document.body.insertAdjacentHTML("beforeend",'<div class="mock-tag">PREVIEW DATA</div>');
  document.getElementById("total").innerHTML = fmt(STATE.totalMonthly)+"<small> /mes</small>";
  const tiles = document.getElementById("tiles");
  tiles.innerHTML = "";
  STATE.subscriptions.forEach(s=>{
    const badge = s.flag ? `<span class="badge ${s.flagType||'warn'}">${s.flag}</span>` : "";
    tiles.insertAdjacentHTML("beforeend", `
      <div class="tile" onclick="openChat('${s.vertical}','${esc(s.provider)}')">
        <div class="ic">${ICONS[s.vertical]||"📦"}</div>
        <div class="mid"><div class="prov">${esc(s.provider)}</div>
          <div class="plan">${esc(s.planName)}</div>${badge}</div>
        <div class="price">${fmt(s.monthlyEur)}</div>
      </div>`);
  });
}
function fmt(n){ return (n==null)?"–":(Number(n).toFixed(2).replace(".",",")+"€"); }
function esc(s){ return String(s).replace(/[<>&"']/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[c])); }

function show(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); }
function showDash(){ show("dash"); }
function showChat(){ show("chat"); }

const V_LABEL = {telco:"Telko / mobilni + TV", energy:"Elektrika + plin", insurance:"Zavarovanja", water:"Voda (informativno)"};
function openChat(vertical, provider){
  VERTICAL = vertical; HISTORY = []; TURNS = 0;
  document.getElementById("chat-title").textContent = "Svetovalec";
  document.getElementById("chat-sub").textContent = V_LABEL[vertical]||vertical;
  document.getElementById("msgs").innerHTML = "";
  document.getElementById("finish").style.display = "none";
  show("chat");
  const opener = OPENERS[vertical] || "zivjo! kaj te zanima glede tvoje narocnine?";
  addMsg("ai", opener);
}
function addMsg(role, text){
  const m = document.getElementById("msgs");
  m.insertAdjacentHTML("beforeend", `<div class="b ${role}">${esc(text)}</div>`);
  m.scrollTop = m.scrollHeight;
}
function typing(on){
  const m = document.getElementById("msgs");
  let t = document.getElementById("tw");
  if(on && !t){ m.insertAdjacentHTML("beforeend",'<div class="typing" id="tw"><span></span><span></span><span></span></div>'); m.scrollTop=m.scrollHeight; }
  if(!on && t) t.remove();
}
async function send(){
  const inp = document.getElementById("input");
  const text = inp.value.trim(); if(!text) return;
  inp.value=""; addMsg("me", text); HISTORY.push({role:"user", content:text}); TURNS++;
  typing(true);
  const res = await api("/api/chat", {vertical:VERTICAL, history:HISTORY});
  typing(false);
  const reply = (res && res.reply) ? res.reply : fallbackReply(text);
  addMsg("ai", reply); HISTORY.push({role:"assistant", content:reply});
  if(TURNS>=2) document.getElementById("finish").style.display="block";
}

async function buildProfile(){
  typing(true); document.getElementById("finish").style.display="none";
  const res = await api("/api/profile", {vertical:VERTICAL, history:HISTORY});
  typing(false);
  renderNeeds(res || MOCK_PROFILE[VERTICAL] || MOCK_PROFILE.telco);
}
function renderNeeds(p){
  document.getElementById("needs-vertical").textContent = V_LABEL[p.vertical]||p.vertical;
  const c = document.getElementById("needs-card");
  let drops = (p.dontPayFor||[]).map((d,i)=>`
    <div class="drop-item" id="drop${i}">
      <div class="di-name">${esc(d.name)}${d.note?`<small>${esc(d.note)}</small>`:""}</div>
      <div class="di-price">−${fmt(d.monthlyEur)}</div>
    </div>`).join("");
  const totalSaved = (p.dontPayFor||[]).reduce((s,d)=>s+(Number(d.monthlyEur)||0),0);
  c.innerHTML = `
    <h2>${esc(p.summary||"tvoj profil")}</h2>
    <p class="summary">${esc(p.summaryLine||"")}</p>
    ${p.recommendation?`<div class="rec"><div class="t">pravo zate</div>
      <div class="n">${esc(p.recommendation.name)}</div>
      <div class="w">${esc(p.recommendation.why||"")}</div></div>`:""}
    ${drops?`<div class="drop"><div class="t">za to placujes, pa ne rabis</div>${drops}</div>`:""}
    ${totalSaved>0?`<div class="saved">prihranek <b>${fmt(totalSaved)}/mes</b><span class="sub">${fmt(totalSaved*12)} na leto</span></div>`:""}
    <button class="cta" onclick="book()">rezerviraj pravo ponudbo</button>`;
  show("needs");
  // the money beat: strike the drop items one by one
  (p.dontPayFor||[]).forEach((_,i)=> setTimeout(()=>{ const el=document.getElementById("drop"+i); if(el) el.classList.add("struck"); }, 500+i*650));
}
async function book(){ await api("/api/lead", {vertical:VERTICAL, history:HISTORY}); show("done"); }

/* ---- preview / stage-fallback data (used only if backend unreachable) ---- */
const OPENERS = {
  telco:"zivjo! vidim da mas Telemach EON FULL. kej te muci na racunu?",
  energy:"elektrika + plin sta odvisna od porabe. da vidim ce placujes prevec?",
  insurance:"da vidim kaj res rabis pa kaj placujes zaman. kaj vse mas zavarovano?"
};
function fallbackReply(t){ return "(demo) dober vprasanje - to ti povem tocno iz podatkov, ko je backend gor."; }
const MOCK = {
  totalMonthly:172.4,
  subscriptions:[
    {vertical:"telco", provider:"Telemach", planName:"EON FULL + Arena Sport", monthlyEur:54.9, flag:"placujes sport ki ga ne gledas", flagType:"warn"},
    {vertical:"energy", provider:"GEN-I", planName:"standardna elektrika + plin", monthlyEur:78.0, flag:"obstaja cenejsi fiksni tarif", flagType:"warn"},
    {vertical:"insurance", provider:"Vzajemna", planName:"dopolnilno zdravstveno", monthlyEur:35.0, flag:"od 2024 podvojeno z OZP", flagType:"warn"},
    {vertical:"water", provider:"JP VOKA Snaga", planName:"Ljubljana, obcinski", monthlyEur:34.5, flag:"ni menjave - samo informativno", flagType:"info"}
  ]
};
const MOCK_PROFILE = { telco:{
  vertical:"telco", summary:"rabis solidno mobilno + net, brez sporta",
  summaryLine:"2 telefona, delas od doma, sporta ne gledas",
  recommendation:{name:"EON LIGHT + net 1Gbps", why:"pokrije net za delo, brez placljivega sporta"},
  dontPayFor:[
    {name:"Arena Sport dodatek", monthlyEur:8.0, note:"ne gledas sporta"},
    {name:"neomejeni mobilni podatki", monthlyEur:6.0, note:"porabis ~15GB"}
  ]
}};
boot();
</script>
</body>
</html>
